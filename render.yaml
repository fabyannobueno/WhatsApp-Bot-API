services:
  - type: web
    name: isound-whatsapp-bot
    runtime: docker
    plan: starter
    region: oregon

    healthCheckPath: /api/healthz

    disk:
      name: whatsapp-auth
      mountPath: /data
      sizeGB: 1

    envVars:
      - key: WWEBJS_DATA_PATH
        value: /data/.wwebjs_auth
      - key: WHATSAPP_API_KEY
        sync: false
